spring:
  application:
    name: fms-backend

  # Cấu hình kết nối Database PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:fms_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:123456789}
    driver-class-name: org.postgresql.Driver

  # Cấu hình Hibernate / JPA
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${SERVER_PORT:8080}

# Cấu hình JWT Security
app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    access-expiration: ${JWT_ACCESS_EXPIRATION:900000}      # 15 phút (milliseconds)
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:28800000}  # 8 tiếng (milliseconds)
