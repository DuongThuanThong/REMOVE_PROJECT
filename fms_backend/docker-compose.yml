version: '3.8' #Phiên bản docker d
services:
  postgres_db:
    image: postgres:16
    container_name: fms_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456789}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7-alpine
    container_name: fms_redis
    ports:
      - "${REDIS_PORT}:6379"
    restart: unless-stopped


volumes:
  postgres_data: